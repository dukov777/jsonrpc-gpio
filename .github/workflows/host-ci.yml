# Host-target CI: build and run the host test suite (unit + E2E) on Linux.
#
# The tests are platform-agnostic, so CI runs on ubuntu-latest (1x billing,
# faster than macOS) targeting the Linux host triple — independent of the
# Mac-specific `test-host` alias used for local dev. `--tests` runs lib unit +
# integration tests, skipping examples (so serial_bench's `serialport` dep isn't
# built in CI). No `tee`, so a failure fails the job.
name: host-ci

on:
  push:
  pull_request:

jobs:
  test-host:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # serialport (dev-dep behind examples/serial_bench.rs) links libudev on
      # Linux; cargo compiles dev-deps even with `--tests`, so provide it.
      - name: Install libudev (serialport build dep)
        run: sudo apt-get update && sudo apt-get install -y libudev-dev pkg-config

      # Espressif Rust fork (channel = "esp"), with rust-src for build-std.
      # GITHUB_TOKEN authenticates the action's GitHub API lookup of the latest
      # toolchain version, avoiding the unauthenticated rate-limit (403).
      - uses: esp-rs/xtensa-toolchain@v1.5
        with:
          default: true
          buildtargets: esp32s3
          ldproxy: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run host tests
        run: cargo test --target x86_64-unknown-linux-gnu --tests
